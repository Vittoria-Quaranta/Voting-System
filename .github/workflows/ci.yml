name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore VotingSystem.sln

      - name: Build
        run: dotnet build VotingSystem.sln --no-restore --configuration Release

      - name: Test with coverage  # uses coverlet.collector from test .csproj
        run: >
          dotnet test VotingSystem.sln
          --no-build
          --configuration Release
          --logger "trx;LogFileName=results.trx"
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
        # https://www.marktinderholt.com/github/2024/12/19/dotnet-unit-test-github-actions.html

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: >
          reportgenerator
          -reports:"VotingSystem.Tests/TestResults/*/coverage.cobertura.xml"
          -targetdir:"CoverageReport"
          -reporttypes:"Html;TextSummary"
          -assemblyfilters:"+VotingSystem.Managers;+VotingSystem.Engines"

      - name: Print coverage summary
        run: cat CoverageReport/Summary.txt

      - name: Check 80% threshold on managers/engines
        run: |
          LINE_RATE=$(grep -oP 'Line coverage: \K[0-9.]+' CoverageReport/Summary.txt || echo "0")
          echo "Coverage: ${LINE_RATE}%"
          if [ "$(echo "$LINE_RATE < 80" | bc)" -eq 1 ]; then
            echo "::error::Coverage ${LINE_RATE}% is below 80% threshold"
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/VotingSystem.Tests/TestResults/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/CoverageReport/

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

# https://docs.github.com/en/actions/tutorials/build-and-test-code/net
# https://github.com/danielpalme/ReportGenerator-GitHub-Action